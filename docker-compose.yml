services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      # Сессия Pyrogram должна пережить перезапуск контейнера
      - ./pyrogram_session.session:/app/pyrogram_session.session
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: alarm_user
      POSTGRES_PASSWORD: alarm_password
      POSTGRES_DB: alarm_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alarm_user -d alarm_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
